<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InBetween</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <div id="meetingTitle" class="meeting-title">meeting</div>

    <main id="stage" class="stage grid-mode"></main>

    <div class="toolbar-shell">
      <div class="toolbar">
        <button id="copyLinkBtn" class="toolbar-btn primary">Copy Invite Link</button>
        <button id="circleToggleBtn" class="toolbar-btn">Circle Mode Off</button>
        <button id="muteBtn" class="toolbar-btn primary">Mute</button>
        <button id="cameraBtn" class="toolbar-btn primary">Camera Off</button>
        <button id="leaveBtn" class="toolbar-btn">Leave</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
